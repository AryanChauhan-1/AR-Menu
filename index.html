<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#060606">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ahara — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#060606;overflow:hidden;overscroll-behavior:none}

:root{
  --gold:#c9983a;
  --gold-light:#e8b84b;
  --cream:#f5f0e8;
  --bg:#060606;
  --text-dim:rgba(245,240,232,0.45);
  --text-muted:rgba(245,240,232,0.22);
  --panel-bg:rgba(7,7,7,0.95);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font-b:'DM Sans',sans-serif;
  --expo:cubic-bezier(0.16,1,0.3,1);
}

#app{width:100vw;height:100vh;position:relative;overflow:hidden}

.screen{position:absolute;inset:0}

/* ── HOME ──────────────────────────────────────────────────── */
#home{z-index:1;background:var(--bg)}
#home-scroll{
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#home-scroll::-webkit-scrollbar{display:none}

/* Ambient orbs */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px)}
.o1{width:340px;height:340px;top:-100px;left:-80px;
  background:radial-gradient(circle,rgba(201,152,58,0.15),transparent 70%);
  animation:o1f 20s ease-in-out infinite}
.o2{width:260px;height:260px;bottom:25%;right:-80px;
  background:radial-gradient(circle,rgba(201,152,58,0.09),transparent 70%);
  animation:o2f 25s ease-in-out infinite 4s}
.o3{width:200px;height:200px;top:50%;left:5%;
  background:radial-gradient(circle,rgba(160,100,20,0.07),transparent 70%);
  animation:o3f 30s ease-in-out infinite 8s}

@keyframes o1f{0%,100%{transform:translate(0,0) scale(1);opacity:.55}
  40%{transform:translate(50px,70px) scale(1.12);opacity:.8}
  70%{transform:translate(-20px,30px) scale(.92);opacity:.5}}
@keyframes o2f{0%,100%{transform:translate(0,0);opacity:.45}
  50%{transform:translate(-45px,-55px) scale(1.1);opacity:.65}}
@keyframes o3f{0%,100%{transform:translate(0,0);opacity:.35}
  50%{transform:translate(35px,-45px);opacity:.55}}

/* ── HERO ────────────────────────────────────────────────── */
.hero{
  position:relative;z-index:2;
  padding:calc(58px + var(--safe-t)) 26px 32px;
  will-change:transform,opacity;
}
.hero-tag{
  font-family:var(--font-b);font-size:9px;font-weight:300;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);opacity:.7;margin-bottom:10px;
  animation:fup .9s var(--expo) .1s both;
}
.hero-name{
  font-family:var(--font-d);font-size:50px;font-weight:300;
  color:var(--cream);line-height:.95;letter-spacing:-1.5px;
  animation:fup .9s var(--expo) .15s both;
}
.hero-name em{font-style:italic;color:var(--gold-light);font-weight:400}
.hero-quote{
  font-family:var(--font-d);font-size:13px;font-weight:300;font-style:italic;
  color:var(--text-dim);line-height:1.65;
  margin-top:14px;padding-left:14px;
  border-left:1px solid rgba(201,152,58,.28);
  animation:fup .9s var(--expo) .22s both;
}
.hero-rule{
  display:flex;align-items:center;gap:10px;margin-top:22px;
  animation:fin .8s ease .3s both;
}
.hero-line{flex:1;height:.5px;background:linear-gradient(90deg,rgba(201,152,58,.35),transparent)}
.hero-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.45}

/* ── FEATURED ────────────────────────────────────────────── */
.feat-wrap{
  position:relative;z-index:2;
  padding:0 26px 26px;
  animation:fup .9s var(--expo) .32s both;
}
.feat-label{
  font-family:var(--font-b);font-size:9px;font-weight:300;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);opacity:.65;margin-bottom:10px;
}
.feat-card{
  position:relative;width:100%;height:196px;
  border-radius:20px;overflow:hidden;cursor:pointer;
  border:.5px solid rgba(255,255,255,.08);
  transition:transform .3s var(--expo);
}
.feat-card:active{transform:scale(.97)}
.feat-img{
  position:absolute;inset:0;background-size:cover;background-position:center;
  transition:transform .5s ease;
}
.feat-card:active .feat-img{transform:scale(1.05)}
.feat-ov{
  position:absolute;inset:0;
  background:linear-gradient(110deg,rgba(0,0,0,.88) 0%,rgba(0,0,0,.3) 55%,transparent 100%);
}
.feat-shimmer{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.055) 50%,transparent 60%);
  background-size:220% 100%;
  animation:shim 3.5s ease-in-out infinite 1s;
}
@keyframes shim{0%{background-position:220% 0}100%{background-position:-220% 0}}
.feat-arrow{
  position:absolute;top:14px;right:14px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.09);
  border:.5px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:rgba(255,255,255,.7);
  backdrop-filter:blur(8px);
}
.feat-body{
  position:absolute;bottom:0;left:0;right:0;
  padding:18px 18px 18px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.feat-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--font-b);font-size:8px;font-weight:400;
  letter-spacing:2px;text-transform:uppercase;color:#fff;
  background:rgba(201,152,58,.82);
  padding:4px 10px;border-radius:20px;
  margin-bottom:7px;
}
.feat-dish-name{
  font-family:var(--font-d);font-size:25px;font-weight:400;
  color:#fff;line-height:1.1;
}
.feat-dish-price{
  font-family:var(--font-d);font-size:19px;font-weight:300;
  color:var(--gold-light);flex-shrink:0;
}

/* ── CATEGORIES ──────────────────────────────────────────── */
.cats{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,rgba(6,6,6,.97) 82%,transparent);
  padding:11px 26px 13px;
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  animation:fin .6s ease .4s both;
}
.cats-row{
  display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.cats-row::-webkit-scrollbar{display:none}
.cat{
  flex-shrink:0;
  font-family:var(--font-b);font-size:11px;font-weight:400;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-muted);
  padding:7px 16px;border-radius:40px;
  border:.5px solid rgba(255,255,255,.08);
  background:transparent;cursor:pointer;white-space:nowrap;
  transition:all .28s ease;
}
.cat.active{
  color:#080400;background:var(--gold);
  border-color:var(--gold);font-weight:500;
}

/* ── GRID ────────────────────────────────────────────────── */
.grid-wrap{
  position:relative;z-index:2;
  padding:6px 26px calc(100px + var(--safe-b));
}
.grid-sec-label{
  font-family:var(--font-b);font-size:9px;font-weight:300;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:14px;margin-top:4px;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── CARD ────────────────────────────────────────────────── */
.card{
  position:relative;border-radius:16px;overflow:hidden;
  cursor:pointer;border:.5px solid rgba(255,255,255,.07);
  aspect-ratio:3/4;
  opacity:0;transform:translateY(22px) scale(.97);
  transition:opacity .55s ease,transform .55s var(--expo),box-shadow .3s ease;
  will-change:transform,opacity;
}
.card.in{opacity:1;transform:translateY(0) scale(1)}
.card:active{transform:scale(.95)!important;opacity:.88!important}

.card-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .5s ease}
.card:active .card-img{transform:scale(1.07)}
.card-bg{position:absolute;inset:0}
.card-emoji{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:50px;opacity:.11;filter:grayscale(1) brightness(1.6);
}
.card-ov{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 18%,rgba(0,0,0,.35) 52%,rgba(0,0,0,.9) 84%,rgba(0,0,0,.97) 100%);
}
.card-shim{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.045) 50%,transparent 65%);
  background-size:200% 100%;
  animation:shim 3s ease-in-out infinite;
}
.card-vdot{
  position:absolute;top:9px;left:9px;
  width:7px;height:7px;border-radius:50%;border:1.5px solid;
}
.vdot-v{background:#4cd964;border-color:#4cd964}
.vdot-n{background:#e74c3c;border-color:#e74c3c}
.card-body{position:absolute;bottom:0;left:0;right:0;padding:11px 11px 13px}
.card-cat{
  font-family:var(--font-b);font-size:8px;font-weight:300;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);opacity:.75;display:block;margin-bottom:4px;
}
.card-name{
  font-family:var(--font-d);font-size:15px;font-weight:500;
  color:var(--cream);line-height:1.2;margin-bottom:3px;
}
.card-price{
  font-family:var(--font-b);font-size:11.5px;font-weight:400;
  color:var(--gold-light);
}

/* ── HOME FOOTER ─────────────────────────────────────────── */
.hfooter{
  position:relative;z-index:2;text-align:center;
  padding:0 26px calc(36px + var(--safe-b));
}
.hfooter-dots{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:9px}
.hfooter-dot{width:3px;height:3px;border-radius:50%;background:rgba(201,152,58,.28)}
.hfooter-text{
  font-family:var(--font-d);font-size:11px;font-weight:300;font-style:italic;
  letter-spacing:3px;color:var(--text-muted);
}

/* ════════════════════════════════════════════════════════════
   DISH SCREEN
════════════════════════════════════════════════════════════ */
#dish{
  z-index:2;background:var(--bg);
  transform:translateY(100%);opacity:0;pointer-events:none;
  transition:transform .65s var(--expo),opacity .65s ease;
}
#dish.active{transform:translateY(0);opacity:1;pointer-events:all}

.dish-amb{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% 30%,rgba(201,152,58,.07) 0%,transparent 65%),
    radial-gradient(ellipse 40% 30% at 15% 70%,rgba(201,152,58,.03) 0%,transparent 60%);
}

/* top bar */
.dish-bar{
  position:absolute;top:0;left:0;right:0;z-index:20;
  padding:calc(50px + var(--safe-t)) 22px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.back{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.07);
  border:.5px solid rgba(255,255,255,.1);
  border-radius:40px;padding:8px 16px 8px 12px;
  cursor:pointer;backdrop-filter:blur(16px);
  transition:background .2s,transform .15s;
}
.back:active{transform:scale(.95);background:rgba(255,255,255,.12)}
.back-arr{font-size:13px;color:rgba(255,255,255,.5)}
.back-lbl{
  font-family:var(--font-b);font-size:11px;font-weight:400;
  letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);
}
.dish-ctr{
  font-family:var(--font-b);font-size:11px;font-weight:300;
  color:var(--text-muted);letter-spacing:1px;
}

/* model area */
.model-area{
  position:absolute;top:0;left:0;right:0;
  bottom:0;padding-bottom:88px;
  display:flex;align-items:center;justify-content:center;
  z-index:5;
}
model-viewer{width:100%;height:100%;background:transparent;--poster-color:transparent}

.mph{
  position:absolute;inset:0;padding-bottom:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  pointer-events:none;transition:opacity .5s ease;
}
.mph.gone{opacity:0}
.spin{
  width:50px;height:50px;border-radius:50%;
  border:1px solid rgba(201,152,58,.12);border-top-color:var(--gold);
  animation:sp 1.1s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-txt{
  font-family:var(--font-b);font-size:10px;font-weight:300;
  letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);
}

.no-model{
  position:absolute;inset:0;padding-bottom:80px;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;pointer-events:none;
}
.no-model.on{display:flex}
.no-model-icon{font-size:42px;opacity:.1}
.no-model-txt{
  font-family:var(--font-b);font-size:10px;font-weight:300;
  letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);
}

.dish-glow{
  position:absolute;width:55%;height:28px;
  left:50%;transform:translateX(-50%);
  bottom:85px;
  background:radial-gradient(ellipse,rgba(201,152,58,.13) 0%,transparent 75%);
  filter:blur(14px);pointer-events:none;z-index:6;
}

/* ── FLOATING AR BUTTON ──────────────────────────────────── */
.ar-float{
  position:absolute;
  right:20px;
  bottom:calc(90px + var(--safe-b));
  z-index:16;
  display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,#c9983a,#e8b84b);
  border:none;border-radius:40px;
  padding:10px 16px 10px 13px;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(201,152,58,.32),0 1px 0 rgba(255,255,255,.12) inset;
  transition:transform .18s var(--expo),box-shadow .18s ease,opacity .18s ease;
  overflow:hidden;
}
.ar-float:active{transform:scale(.94);box-shadow:0 2px 10px rgba(201,152,58,.2)}
.ar-float::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:bshim 4s ease-in-out infinite 1.5s;
}
@keyframes bshim{0%{left:-100%}35%,100%{left:130%}}
.ar-float-icon{
  font-size:14px;color:#0a0500;position:relative;z-index:1;
  line-height:1;
}
.ar-float-lbl{
  font-family:var(--font-b);font-size:12px;font-weight:500;
  color:#0a0500;letter-spacing:.3px;
  position:relative;z-index:1;white-space:nowrap;
}

/* ── INFO STRIP ──────────────────────────────────────────── */
.info-strip{
  position:absolute;left:0;right:0;bottom:0;z-index:15;
  background:var(--panel-bg);
  backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.8);
  border-top:.5px solid rgba(255,255,255,.07);
  border-radius:22px 22px 0 0;
  padding:14px 20px calc(14px + var(--safe-b));
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  transition:transform .5s var(--expo),opacity .4s ease;
}

.strip-left{flex:1;min-width:0}
.strip-name{
  font-family:var(--font-d);font-size:20px;font-weight:500;
  color:var(--cream);line-height:1.1;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.strip-price{
  font-family:var(--font-d);font-size:15px;font-weight:300;
  color:var(--gold-light);margin-top:2px;
}

.info-btn{
  flex-shrink:0;
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);
  border:.5px solid rgba(255,255,255,.12);
  border-radius:40px;padding:8px 14px;
  cursor:pointer;
  transition:background .2s,transform .15s;
  white-space:nowrap;
}
.info-btn:active{transform:scale(.95);background:rgba(255,255,255,.1)}
.info-btn-icon{font-size:12px;color:var(--gold);opacity:.8}
.info-btn-lbl{
  font-family:var(--font-b);font-size:10px;font-weight:400;
  letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(245,240,232,.5);
}

/* ── INFO MODAL ──────────────────────────────────────────── */
.modal-backdrop{
  position:absolute;inset:0;z-index:25;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background .4s ease;
}
.modal-backdrop.open{
  background:rgba(0,0,0,.55);
  pointer-events:all;
}

.info-modal{
  position:absolute;left:0;right:0;bottom:0;z-index:26;
  background:rgba(10,10,10,.97);
  backdrop-filter:blur(36px) saturate(2);
  -webkit-backdrop-filter:blur(36px) saturate(2);
  border-top:.5px solid rgba(255,255,255,.09);
  border-radius:28px 28px 0 0;
  padding:0 22px calc(28px + var(--safe-b));
  transform:translateY(100%);
  transition:transform .52s var(--expo);
  will-change:transform;
}
.info-modal.open{transform:translateY(0)}

/* Modal handle */
.modal-handle-row{
  display:flex;justify-content:center;padding:16px 0 18px;
}
.modal-handle{
  width:38px;height:3px;border-radius:2px;
  background:rgba(255,255,255,.15);
}

/* Modal header */
.modal-header{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  margin-bottom:6px;
}
.modal-name{
  font-family:var(--font-d);font-size:26px;font-weight:500;
  color:var(--cream);line-height:1.1;letter-spacing:-.3px;
  flex:1;margin-right:14px;
}
.modal-price{
  font-family:var(--font-d);font-size:22px;font-weight:300;
  color:var(--gold-light);flex-shrink:0;padding-top:2px;
}

/* Category badge */
.modal-cat-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--font-b);font-size:9px;font-weight:300;
  letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);border:.5px solid rgba(201,152,58,.28);
  background:rgba(201,152,58,.08);
  padding:4px 11px;border-radius:20px;
  margin-bottom:18px;
}

/* Divider */
.modal-div{
  height:.5px;
  background:linear-gradient(90deg,rgba(255,255,255,.08),transparent);
  margin-bottom:18px;
}

/* Description */
.modal-desc-label{
  font-family:var(--font-b);font-size:9px;font-weight:300;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:8px;
}
.modal-desc{
  font-family:var(--font-d);font-size:15px;font-weight:300;font-style:italic;
  line-height:1.75;color:rgba(245,240,232,.6);
  margin-bottom:22px;
}

/* Tags */
.modal-tags-label{
  font-family:var(--font-b);font-size:9px;font-weight:300;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:10px;
}
.modal-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px}
.m-tag{
  font-family:var(--font-b);font-size:9px;font-weight:400;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 12px;border-radius:20px;border:.5px solid;
}
.tv{color:#6fcf8a;border-color:rgba(111,207,138,.3);background:rgba(111,207,138,.07)}
.td{color:#e8b84b;border-color:rgba(232,184,75,.3);background:rgba(232,184,75,.07)}
.ts{color:#ff7b54;border-color:rgba(255,123,84,.3);background:rgba(255,123,84,.07)}
.tg{color:#88c0d0;border-color:rgba(136,192,208,.3);background:rgba(136,192,208,.07)}
.tn{color:#d4a0ff;border-color:rgba(212,160,255,.3);background:rgba(212,160,255,.07)}

/* Nutrition / extras row */
.modal-extras{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:22px;
}
.modal-extra-item{
  background:rgba(255,255,255,.03);
  border:.5px solid rgba(255,255,255,.07);
  border-radius:12px;padding:12px 14px;
}
.extra-label{
  font-family:var(--font-b);font-size:9px;font-weight:300;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:4px;
}
.extra-val{
  font-family:var(--font-d);font-size:16px;font-weight:400;
  color:rgba(245,240,232,.7);
}

/* Close row */
.modal-close-row{
  display:flex;justify-content:center;
}
.modal-close{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.05);
  border:.5px solid rgba(255,255,255,.1);
  border-radius:40px;padding:10px 22px;
  cursor:pointer;
  transition:background .2s,transform .15s;
  font-family:var(--font-b);font-size:11px;font-weight:400;
  letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(245,240,232,.4);
}
.modal-close:active{transform:scale(.96);background:rgba(255,255,255,.09)}

/* ── KEYFRAMES ───────────────────────────────────────────── */
@keyframes fup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fin{from{opacity:0}to{opacity:1}}

/* Noise */
.noise{
  position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.026;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

</style>
</head>
<body>
<div id="app">
<div class="noise"></div>

<!-- ══ HOME ════════════════════════════════════════════════ -->
<div id="home" class="screen">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>

  <div id="home-scroll">

    <div class="hero" id="hero">
      <div class="hero-tag" id="hero-tag">Est. 2024 · Fine Dining</div>
      <h1 class="hero-name">Ahara <em>Menu</em></h1>
      <p class="hero-quote" id="hero-quote">"We do not cook food.<br>We craft experiences."</p>
      <div class="hero-rule">
        <div class="hero-line"></div>
        <div class="hero-dot"></div>
        <div class="hero-line" style="background:linear-gradient(270deg,rgba(201,152,58,.35),transparent)"></div>
      </div>
    </div>

    <div class="feat-wrap">
      <div class="feat-label">✦ &nbsp;Chef's Recommendation</div>
      <div class="feat-card" id="feat-card">
        <div class="feat-img" id="feat-img"></div>
        <div class="feat-ov"></div>
        <div class="feat-shimmer"></div>
        <div class="feat-arrow">↗</div>
        <div class="feat-body">
          <div>
            <div class="feat-badge">⭑ &nbsp;Tonight's Special</div>
            <div class="feat-dish-name" id="feat-name">—</div>
          </div>
          <div class="feat-dish-price" id="feat-price">—</div>
        </div>
      </div>
    </div>

    <div class="cats">
      <div class="cats-row" id="cats-row"></div>
    </div>

    <div class="grid-wrap">
      <div class="grid-sec-label" id="grid-label">All Dishes</div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="hfooter">
      <div class="hfooter-dots">
        <div class="hfooter-dot"></div><div class="hfooter-dot"></div><div class="hfooter-dot"></div>
      </div>
      <div class="hfooter-text">Scan · Explore · Savour</div>
    </div>

  </div>
</div>

<!-- ══ DISH ════════════════════════════════════════════════ -->
<div id="dish" class="screen">
  <div class="dish-amb"></div>

  <div class="dish-bar">
    <button class="back" id="back">
      <span class="back-arr">←</span>
      <span class="back-lbl">Menu</span>
    </button>
    <div class="dish-ctr" id="dctr"></div>
  </div>

  <div class="model-area" id="marea">
    <div class="mph" id="mph">
      <div class="spin"></div>
      <div class="spin-txt">Loading model</div>
    </div>
    <div class="no-model" id="nomod">
      <div class="no-model-icon">🍽</div>
      <div class="no-model-txt">3D model coming soon</div>
    </div>
  </div>

  <div class="dish-glow"></div>

  <!-- Floating AR button -->
  <button class="ar-float" id="arbtn">
    <span class="ar-float-icon">✦</span>
    <span class="ar-float-lbl">View in AR</span>
  </button>

  <!-- Slim info strip -->
  <div class="info-strip" id="info-strip">
    <div class="strip-left">
      <div class="strip-name" id="sname">—</div>
      <div class="strip-price" id="sprice">—</div>
    </div>
    <button class="info-btn" id="info-btn">
      <span class="info-btn-icon">✦</span>
      <span class="info-btn-lbl">Details</span>
    </button>
  </div>

  <!-- Modal backdrop -->
  <div class="modal-backdrop" id="modal-backdrop"></div>

  <!-- Detailed info modal -->
  <div class="info-modal" id="info-modal">
    <div class="modal-handle-row">
      <div class="modal-handle"></div>
    </div>
    <div class="modal-header">
      <div class="modal-name" id="modal-name">—</div>
      <div class="modal-price" id="modal-price">—</div>
    </div>
    <div class="modal-cat-badge" id="modal-cat">—</div>
    <div class="modal-div"></div>
    <div class="modal-desc-label">About this dish</div>
    <div class="modal-desc" id="modal-desc">—</div>
    <div class="modal-tags-label">Dietary info</div>
    <div class="modal-tags" id="modal-tags"></div>
    <div class="modal-extras" id="modal-extras"></div>
    <div class="modal-close-row">
      <button class="modal-close" id="modal-close">✕ &nbsp;Close</button>
    </div>
  </div>
</div>

</div><!-- /app -->

<script>
/* ═══════════════════════════════════════════════════════════
   MENU DATA
   ═══════════════════════════════════════════════════════════
   For each dish fill in:
   - imageUrl : "final_models/snacks/Spring_roll.png"   (food photo)
   - modelUrl : "final_models/snacks/Spring-Roll.glb"   (3D model)
   - iosUrl   : "final_models/snacks/Spring-Roll.usdz"  (iOS AR)
   - featured : true on ONE dish only
   Change RESTAURANT_NAME, TAGLINE and QUOTE below too.
*/

const RESTAURANT_NAME = "Ahara";
const TAGLINE         = "Est. 2024 · Fine Dining";
const QUOTE           = "We do not cook food. We craft experiences.";

const CATS = ["All","Starters","Mains","Desserts","Drinks"];

const TAGS = {

};

const MENU = [
  {
    id:"d01", name:"Saffron Shorba", price:"₹480", category:"Starters",
    desc:"Delicate broth of saffron, roasted tomato and spiced cream, finished with a thread of gold oil.",
    tags:["veg","dairy"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#1a1008,#2d1f0a)", emoji:"🥣"
  },
  {
    id:"d02", name:"Smoked Burrata", price:"₹680", category:"Starters",
    desc:"Cold-smoked burrata on charred sourdough, heirloom tomato compote, micro basil, aged balsamic.",
    tags:["veg","dairy","nuts"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#0f1208,#1c2010)", emoji:"🧀"
  },
  {
    id:"d03", name:"Prawn Tikka", price:"₹820", category:"Starters",
    desc:"Tiger prawns marinated in smoked paprika and hung curd, finished in a tandoor, served with kokum chutney.",
    tags:["spicy","dairy"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#1a0c08,#2a1410)", emoji:"🦐"
  },
  {
    id:"d04", name:"Truffle Risotto", price:"₹1,840", category:"Mains",
    desc:"Arborio rice, aged parmigiano, black truffle shavings, 24-hour bone broth reduction.",
    tags:["veg","dairy"], featured:true,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#14100a,#22180e)", emoji:"🍚"
  },
  {
    id:"d05", name:"Lamb Raan", price:"₹2,200", category:"Mains",
    desc:"Slow-roasted leg of lamb, 12-hour dum preparation, saffron jus, pomegranate raita.",
    tags:["spicy"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#180a08,#2a1010)", emoji:"🍖"
  },
  {
    id:"d06", name:"Black Cod Miso", price:"₹1,980", category:"Mains",
    desc:"Saikyo miso-marinated black cod, yuzu beurre blanc, pickled cucumber, sesame crisp.",
    tags:["dairy","gf"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#080e18,#0c1628)", emoji:"🐟"
  },
  {
    id:"d07", name:"Wild Mushroom Dal", price:"₹940", category:"Mains",
    desc:"Black lentils, wild porcini, smoked butter, crispy shallots, house-made kulcha.",
    tags:["veg","dairy"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#101008,#1c1c0c)", emoji:"🍄"
  },
  {
    id:"d08", name:"Gulab Panna Cotta", price:"₹520", category:"Desserts",
    desc:"Rose water panna cotta, raspberry coulis, crystallised rose petals, pistachio dust.",
    tags:["veg","dairy","nuts"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#180818,#2a0e2a)", emoji:"🌹"
  },
  {
    id:"d09", name:"Chocolate Sphere", price:"₹680", category:"Desserts",
    desc:"Valrhona 70% sphere filled with salted caramel, dissolved tableside with warm toffee sauce.",
    tags:["veg","dairy"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#100808,#1c0e0e)", emoji:"🍫"
  },
  {
    id:"d10", name:"Kashmiri Kahwa", price:"₹280", category:"Drinks",
    desc:"Traditional green tea with saffron, cardamom, cinnamon and slivered almonds. Served hot.",
    tags:["veg","nuts"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#141008,#201808)", emoji:"🍵"
  },
  {
    id:"d11", name:"Smoked Old Fashioned", price:"₹680", category:"Drinks",
    desc:"Bourbon, demerara, cherry bitters, smoked live with applewood under a glass cloche.",
    tags:[], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#180e08,#281808)", emoji:"🥃"
  },
  {
    id:"d12", name:"Passion Fruit Lassi", price:"₹320", category:"Drinks",
    desc:"Whipped yoghurt, fresh passion fruit pulp, cardamom sugar, edible gold flake.",
    tags:["veg","dairy"], featured:false,
    imageUrl:"", modelUrl:"", iosUrl:"",
    color:"linear-gradient(145deg,#181008,#281c08)", emoji:"🥤"
  }
];

/* ═══════════════════════════════════════════════════════════
   STATE & DOM
═══════════════════════════════════════════════════════════ */
const ST={cat:"All",did:null,mv:null,modalOpen:false};

const hs      = document.getElementById('home-scroll');
const heroEl  = document.getElementById('hero');
const featC   = document.getElementById('feat-card');
const featI   = document.getElementById('feat-img');
const featN   = document.getElementById('feat-name');
const featP   = document.getElementById('feat-price');
const cRow    = document.getElementById('cats-row');
const gridEl  = document.getElementById('grid');
const gLabel  = document.getElementById('grid-label');
const dishSc  = document.getElementById('dish');
const backEl  = document.getElementById('back');
const marea   = document.getElementById('marea');
const mphEl   = document.getElementById('mph');
const nomodEl = document.getElementById('nomod');
const snameEl = document.getElementById('sname');
const spriceEl= document.getElementById('sprice');
const dctrEl  = document.getElementById('dctr');
const arbtn   = document.getElementById('arbtn');
const infoBtn = document.getElementById('info-btn');
const infoBD  = document.getElementById('modal-backdrop');
const infoMod = document.getElementById('info-modal');
const modalNm = document.getElementById('modal-name');
const modalPr = document.getElementById('modal-price');
const modalCt = document.getElementById('modal-cat');
const modalDs = document.getElementById('modal-desc');
const modalTg = document.getElementById('modal-tags');
const modalEx = document.getElementById('modal-extras');
const modalCl = document.getElementById('modal-close');

/* ═══════════════════════════════════════════════════════════
   INIT HEADER TEXT
═══════════════════════════════════════════════════════════ */
document.title = RESTAURANT_NAME + ' — Menu';
document.getElementById('hero-tag').textContent = TAGLINE;
document.getElementById('hero-quote').innerHTML = `"${QUOTE}"`;

/* ═══════════════════════════════════════════════════════════
   PARALLAX
═══════════════════════════════════════════════════════════ */
hs.addEventListener('scroll',()=>{
  const y=hs.scrollTop;
  heroEl.style.transform=`translateY(${y*.32}px)`;
  heroEl.style.opacity=Math.max(0,1-y/200);
},{passive:true});

/* ═══════════════════════════════════════════════════════════
   FEATURED
═══════════════════════════════════════════════════════════ */
function buildFeatured(){
  const d=MENU.find(x=>x.featured)||MENU[0];
  if(d.imageUrl){
    featI.style.cssText=`position:absolute;inset:0;background:url('${d.imageUrl}') center/cover`;
  } else {
    featI.style.cssText=`position:absolute;inset:0;background:${d.color}`;
    featI.innerHTML=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:.09;filter:grayscale(1) brightness(1.5)">${d.emoji}</div>`;
  }
  featN.textContent=d.name;
  featP.textContent=d.price;
  featC.onclick=()=>openDish(d);
}

/* ═══════════════════════════════════════════════════════════
   CATEGORIES
═══════════════════════════════════════════════════════════ */
function buildCats(){
  cRow.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat'+(c===ST.cat?' active':'');
    b.textContent=c;
    b.onclick=()=>{ST.cat=c;buildCats();buildGrid();};
    cRow.appendChild(b);
  });
}

/* ═══════════════════════════════════════════════════════════
   GRID
═══════════════════════════════════════════════════════════ */
function buildGrid(){
  const dishes=ST.cat==='All'?MENU:MENU.filter(d=>d.category===ST.cat);
  gLabel.textContent=ST.cat==='All'?'All Dishes':ST.cat;
  gridEl.innerHTML='';

  dishes.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='card';
    el.style.transitionDelay=`${i*0.055}s`;

    const hp=!!d.imageUrl;
    const isV=d.tags.includes('veg');

    el.innerHTML=`
      ${hp?`<div class="card-img" style="background:url('${d.imageUrl}') center/cover"></div>`
          :`<div class="card-bg" style="background:${d.color}"></div>
            <div class="card-emoji">${d.emoji}</div>`}
      <div class="card-shim"></div>
      <div class="card-ov"></div>
      <div class="card-vdot ${isV?'vdot-v':'vdot-n'}"></div>
      <div class="card-body">
        <span class="card-cat">${d.category}</span>
        <div class="card-name">${d.name}</div>
        <div class="card-price">${d.price}</div>
      </div>
    `;
    el.onclick=()=>openDish(d);
    gridEl.appendChild(el);
  });

  // Staggered entrance via IntersectionObserver
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}
    });
  },{threshold:.08,rootMargin:'0px 0px -16px 0px'});

  gridEl.querySelectorAll('.card').forEach(c=>obs.observe(c));
}

/* ═══════════════════════════════════════════════════════════
   OPEN DISH
═══════════════════════════════════════════════════════════ */
function openDish(d){
  ST.did=d.id;

  snameEl.textContent=d.name;
  spriceEl.textContent=d.price;

  const list=ST.cat==='All'?MENU:MENU.filter(x=>x.category===d.category);
  const idx=list.findIndex(x=>x.id===d.id);
  dctrEl.textContent=`${idx+1} / ${list.length}`;

  const old=marea.querySelector('model-viewer');
  if(old)old.remove();

  if(d.modelUrl){
    mphEl.classList.remove('gone');
    nomodEl.classList.remove('on');
    const mv=document.createElement('model-viewer');
    mv.setAttribute('src',d.modelUrl);
    if(d.iosUrl)mv.setAttribute('ios-src',d.iosUrl);
    mv.setAttribute('ar','');
    mv.setAttribute('ar-modes','webxr scene-viewer quick-look');
    mv.setAttribute('camera-controls','');
    mv.setAttribute('auto-rotate','');
    mv.setAttribute('auto-rotate-delay','800');
    mv.setAttribute('rotation-per-second','18deg');
    mv.setAttribute('shadow-intensity','1.2');
    mv.setAttribute('shadow-softness','1');
    mv.setAttribute('environment-image','neutral');
    mv.setAttribute('exposure','.88');
    mv.setAttribute('camera-orbit','0deg 68deg 105%');
    mv.setAttribute('min-camera-orbit','auto 25deg auto');
    mv.setAttribute('max-camera-orbit','auto 88deg auto');
    mv.setAttribute('disable-zoom','');
    mv.style.cssText='width:100%;height:100%;background:transparent;';
    mv.addEventListener('load',()=>mphEl.classList.add('gone'));
    marea.appendChild(mv);
    ST.mv=mv;
  } else {
    mphEl.classList.add('gone');
    nomodEl.classList.add('on');
    ST.mv=null;
  }

  dishSc.classList.add('active');
}

/* ═══════════════════════════════════════════════════════════
   CLOSE DISH
═══════════════════════════════════════════════════════════ */
backEl.addEventListener('click',()=>{
  closeModal();
  dishSc.classList.remove('active');
  nomodEl.classList.remove('on');
  mphEl.classList.remove('gone');
  const old=marea.querySelector('model-viewer');
  if(old)old.remove();
  ST.mv=null;
});

/* ═══════════════════════════════════════════════════════════
   INFO MODAL
═══════════════════════════════════════════════════════════ */
function openModal(d){
  ST.modalOpen=true;
  // Fill modal
  modalNm.textContent=d.name;
  modalPr.textContent=d.price;
  modalCt.textContent=d.category;
  modalDs.textContent=d.desc;
  modalTg.innerHTML=d.tags.map(t=>{
    const cfg=TAGS[t];
    return cfg?`<span class="m-tag ${cfg.cls}">${cfg.lbl}</span>`:'';
  }).join('');
  // Extras grid — serve time, spice level, portion
  const spiceMap={spicy:'🌶 Spicy',veg:'🌿 Mild'};
  const spice=d.tags.includes('spicy')?'Spicy':'Mild';
  const isV=d.tags.includes('veg');
  modalEx.innerHTML=`
    <div class="modal-extra-item">
      <div class="extra-label">Type</div>
      <div class="extra-val">${isV?'Vegetarian':'Non-Veg'}</div>
    </div>
    <div class="modal-extra-item">
      <div class="extra-label">Heat level</div>
      <div class="extra-val">${spice}</div>
    </div>
    <div class="modal-extra-item">
      <div class="extra-label">Portion</div>
      <div class="extra-val">Serves 1</div>
    </div>
    <div class="modal-extra-item">
      <div class="extra-label">Serve time</div>
      <div class="extra-val">12–18 min</div>
    </div>
  `;
  infoBD.classList.add('open');
  // Small delay so backdrop fades first then modal slides — feels smoother
  requestAnimationFrame(()=>requestAnimationFrame(()=>infoMod.classList.add('open')));
}

function closeModal(){
  ST.modalOpen=false;
  infoMod.classList.remove('open');
  infoBD.classList.remove('open');
}

infoBtn.addEventListener('click',()=>{
  const d=MENU.find(x=>x.id===ST.did);
  if(d)openModal(d);
});

infoBD.addEventListener('click',closeModal);
modalCl.addEventListener('click',closeModal);

/* ═══════════════════════════════════════════════════════════
   AR BUTTON
═══════════════════════════════════════════════════════════ */
arbtn.addEventListener('click',()=>{
  const d=MENU.find(x=>x.id===ST.did);
  if(!d)return;
  arbtn.style.transform='scale(.97)';
  setTimeout(()=>arbtn.style.transform='',150);

  if(!d.modelUrl){
    const lbl=arbtn.querySelector('.ar-float-lbl');
    lbl.textContent='Coming soon';
    setTimeout(()=>lbl.textContent='View in AR',2200);
    return;
  }
  if(ST.mv){ST.mv.activateAR();return;}
  if(/iPhone|iPad/i.test(navigator.userAgent)&&d.iosUrl){
    const a=document.createElement('a');
    a.rel='ar';a.href=d.iosUrl;
    const img=document.createElement('img');
    img.src='data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';
    a.appendChild(img);document.body.appendChild(a);
    a.click();document.body.removeChild(a);
  } else {
    window.location.href=`intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(d.modelUrl)}&mode=ar_preferred#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=${encodeURIComponent(d.modelUrl)};end;`;
  }
});

/* ═══════════════════════════════════════════════════════════
   HASH ROUTING
═══════════════════════════════════════════════════════════ */
function handleHash(){
  const h=location.hash;
  if(!h.startsWith('#dish/'))return;
  const id=h.replace('#dish/','');
  const d=MENU.find(x=>x.id===id);
  if(!d)return;
  ST.cat=d.category;buildCats();buildGrid();
  setTimeout(()=>openDish(d),120);
}
window.addEventListener('hashchange',handleHash);

/* ── BOOT ────────────────────────────────────────────────── */
buildFeatured();
buildCats();
buildGrid();
handleHash();
</script>
</body>
</html>

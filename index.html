<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060606">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>The Restaurant — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>

/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #060606; }

:root {
  --gold: #c9983a;
  --gold-light: #e8b84b;
  --gold-dim: rgba(201,152,58,0.18);
  --cream: #f5f0e8;
  --bg: #060606;
  --bg2: #0d0d0d;
  --bg3: #111;
  --text: #f0ebe0;
  --text-dim: rgba(240,235,224,0.45);
  --text-muted: rgba(240,235,224,0.25);
  --border: rgba(255,255,255,0.07);
  --panel-bg: rgba(8,8,8,0.92);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Outfit', sans-serif;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-expo: cubic-bezier(0.7, 0, 0.84, 0);
}

/* ── APP SHELL ────────────────────────────────────────────── */
#app {
  width: 100vw; height: 100vh;
  position: relative; overflow: hidden;
}

/* ── SCREENS ─────────────────────────────────────────────── */
.screen {
  position: absolute; inset: 0;
  will-change: transform, opacity;
  transition: transform 0.6s var(--ease-out-expo), opacity 0.6s ease;
}

#home-screen { z-index: 1; }
#dish-screen { z-index: 2; transform: translateY(100%); opacity: 0; pointer-events: none; }
#dish-screen.active { transform: translateY(0); opacity: 1; pointer-events: all; }

/* ── GLOBAL NOISE TEXTURE ─────────────────────────────────── */
.noise-layer {
  position: absolute; inset: 0; pointer-events: none; z-index: 100;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
}

/* ══════════════════════════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════════════════════════ */

#home-screen {
  background: var(--bg);
  display: flex; flex-direction: column;
}

/* Ambient background glow */
.home-ambient {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 20%, rgba(201,152,58,0.06) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201,152,58,0.03) 0%, transparent 60%);
}

/* ── HOME HEADER ──────────────────────────────────────────── */
.home-header {
  position: relative; z-index: 10;
  padding: 56px 28px 0;
  display: flex; flex-direction: column; gap: 4px;
}

.home-overline {
  font-family: var(--font-body);
  font-size: 10px; font-weight: 300;
  letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold); opacity: 0.8;
}

.home-title {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 400;
  color: var(--cream); line-height: 1.1;
  letter-spacing: -0.3px;
}

.home-title em { font-style: italic; color: var(--gold-light); }

.home-subtitle {
  font-family: var(--font-body);
  font-size: 12px; font-weight: 300;
  color: var(--text-dim); letter-spacing: 0.3px;
  margin-top: 6px;
}

/* ── CATEGORY TABS ────────────────────────────────────────── */
.category-wrap {
  position: relative; z-index: 10;
  padding: 28px 0 0 28px;
  display: flex; gap: 8px;
  overflow-x: auto; scrollbar-width: none;
}
.category-wrap::-webkit-scrollbar { display: none; }

.cat-tab {
  flex-shrink: 0;
  font-family: var(--font-body);
  font-size: 12px; font-weight: 400;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px 16px; border-radius: 40px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: transparent;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.cat-tab.active {
  color: var(--bg);
  background: var(--gold);
  border-color: var(--gold);
  font-weight: 500;
}

/* ── CAROUSEL ─────────────────────────────────────────────── */
.carousel-outer {
  flex: 1; position: relative; z-index: 5;
  display: flex; align-items: center;
  overflow: hidden;
  padding: 20px 0;
}

.carousel-track {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 28px;
  transition: transform 0.5s var(--ease-out-expo);
  will-change: transform;
  cursor: grab;
  user-select: none;
}
.carousel-track.dragging { cursor: grabbing; transition: none; }

/* ── DISH CARD ────────────────────────────────────────────── */
.dish-card {
  flex-shrink: 0;
  width: calc(100vw - 80px);
  max-width: 340px;
  height: 420px;
  border-radius: 24px;
  position: relative; overflow: hidden;
  cursor: pointer;
  transition: transform 0.4s var(--ease-out-expo), opacity 0.4s ease;
  will-change: transform, opacity;
  border: 0.5px solid rgba(255,255,255,0.08);
}

.dish-card.side { transform: scale(0.88); opacity: 0.5; }
.dish-card.active-card { transform: scale(1); opacity: 1; }

/* Card image area */
.card-img {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform 0.6s ease;
}
.dish-card:active .card-img { transform: scale(1.03); }

/* Card overlay gradient */
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.05) 0%,
    rgba(0,0,0,0.1) 40%,
    rgba(0,0,0,0.75) 75%,
    rgba(0,0,0,0.92) 100%
  );
}

/* Card content */
.card-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 24px 22px 22px;
}

.card-category-badge {
  display: inline-block;
  font-family: var(--font-body);
  font-size: 9px; font-weight: 400;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold);
  border: 0.5px solid rgba(201,152,58,0.4);
  background: rgba(201,152,58,0.1);
  padding: 4px 10px; border-radius: 20px;
  margin-bottom: 10px;
}

.card-name {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 500;
  color: var(--cream); line-height: 1.15;
  letter-spacing: -0.2px;
  margin-bottom: 6px;
}

.card-price {
  font-family: var(--font-body);
  font-size: 14px; font-weight: 400;
  color: var(--gold-light); letter-spacing: 0.3px;
}

/* Card tap indicator */
.card-tap-ring {
  position: absolute; top: 18px; right: 18px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 0.5px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.card-tap-arrow {
  font-size: 14px; color: rgba(255,255,255,0.7);
  transform: rotate(-45deg);
}

/* ── HOME FOOTER ──────────────────────────────────────────── */
.home-footer {
  position: relative; z-index: 10;
  padding: 0 28px 36px;
  display: flex; align-items: center; justify-content: space-between;
}

.carousel-dots { display: flex; gap: 5px; align-items: center; }

.dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: all 0.3s ease;
}
.dot.active { width: 20px; border-radius: 2px; background: var(--gold); }

.swipe-hint {
  font-family: var(--font-body);
  font-size: 10px; font-weight: 300;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-muted);
}

/* Card background patterns (placeholder visuals) */
.card-bg-1 { background: linear-gradient(135deg, #1a1008 0%, #2d1f0a 40%, #1a120a 100%); }
.card-bg-2 { background: linear-gradient(135deg, #0a1218 0%, #0d1f1a 40%, #081410 100%); }
.card-bg-3 { background: linear-gradient(135deg, #180a08 0%, #2a1010 40%, #1a0c0c 100%); }
.card-bg-4 { background: linear-gradient(135deg, #10100a 0%, #1c1c0c 40%, #141008 100%); }
.card-bg-5 { background: linear-gradient(135deg, #0a0e18 0%, #0d1428 40%, #080e1e 100%); }
.card-bg-6 { background: linear-gradient(135deg, #120818 0%, #1e0d2a 40%, #10081e 100%); }
.card-bg-7 { background: linear-gradient(135deg, #181008 0%, #2a1e0a 40%, #1a1208 100%); }
.card-bg-8 { background: linear-gradient(135deg, #081018 0%, #0c1c2a 40%, #081018 100%); }
.card-bg-9 { background: linear-gradient(135deg, #180808 0%, #2a0e0e 40%, #1a0808 100%); }
.card-bg-10 { background: linear-gradient(135deg, #101808 0%, #182a0c 40%, #10180a 100%); }
.card-bg-11 { background: linear-gradient(135deg, #181008 0%, #2a1c08 40%, #1a1208 100%); }
.card-bg-12 { background: linear-gradient(135deg, #080e18 0%, #0e1828 40%, #080e18 100%); }

/* Food illustration overlay per card */
.food-illustration {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 90px; opacity: 0.15;
  filter: grayscale(1) brightness(2);
  pointer-events: none;
}


/* ══════════════════════════════════════════════════════════
   DISH DETAIL SCREEN
══════════════════════════════════════════════════════════ */

#dish-screen {
  background: var(--bg);
  display: flex; flex-direction: column;
}

.dish-ambient {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 55% at 50% 35%, rgba(201,152,58,0.08) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 20% 70%, rgba(201,152,58,0.03) 0%, transparent 60%);
  transition: opacity 0.5s ease;
}

/* ── DISH BACK BUTTON ─────────────────────────────────────── */
.dish-back {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 20;
  padding: 52px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
}

.back-btn {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 40px; padding: 8px 16px 8px 12px;
  cursor: pointer; backdrop-filter: blur(12px);
  transition: background 0.2s ease, transform 0.15s ease;
}
.back-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }

.back-arrow {
  font-size: 14px; color: rgba(255,255,255,0.6);
}
.back-label {
  font-family: var(--font-body);
  font-size: 12px; font-weight: 400;
  letter-spacing: 1px; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

.dish-counter {
  font-family: var(--font-body);
  font-size: 11px; font-weight: 300;
  color: var(--text-muted); letter-spacing: 1px;
}

/* ── MODEL VIEWER AREA ────────────────────────────────────── */
.model-area {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 260px;
  display: flex; align-items: center; justify-content: center;
  z-index: 5;
}

model-viewer {
  width: 100%; height: 100%;
  background: transparent;
  --poster-color: transparent;
}

/* Spinner / placeholder state */
.model-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.model-placeholder.hidden { opacity: 0; }

.spinner-ring {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 1px solid rgba(201,152,58,0.15);
  border-top-color: var(--gold);
  animation: spin 1.2s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.spinner-text {
  font-family: var(--font-body);
  font-size: 11px; font-weight: 300;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-muted);
}

/* Ground glow */
.dish-ground-glow {
  position: absolute;
  width: 50%; height: 32px;
  left: 50%; transform: translateX(-50%);
  bottom: 265px;
  background: radial-gradient(ellipse, rgba(201,152,58,0.15) 0%, transparent 75%);
  filter: blur(12px);
  pointer-events: none; z-index: 6;
}

/* ── DISH INFO PANEL ──────────────────────────────────────── */
.dish-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  height: 260px;
  background: var(--panel-bg);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border-top: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 28px 28px 0 0;
  padding: 20px 24px 32px;
  display: flex; flex-direction: column; gap: 0;
}

/* Drag handle */
.panel-handle {
  width: 36px; height: 3px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.panel-row-top {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 6px;
}

.dish-detail-name {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 500;
  color: var(--cream); line-height: 1.15;
  letter-spacing: -0.2px;
  flex: 1; margin-right: 12px;
}

.dish-detail-price {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 400;
  color: var(--gold-light);
  flex-shrink: 0; padding-top: 2px;
}

.dish-detail-desc {
  font-family: var(--font-body);
  font-size: 12px; font-weight: 300;
  line-height: 1.65; color: rgba(240,235,224,0.48);
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.dish-tags {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 14px;
}

.dish-tag {
  font-family: var(--font-body);
  font-size: 9px; font-weight: 400;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 4px 10px; border-radius: 20px;
  border: 0.5px solid;
}
.tag-veg { color: #6fcf8a; border-color: rgba(111,207,138,0.3); background: rgba(111,207,138,0.08); }
.tag-dairy { color: #e8b84b; border-color: rgba(232,184,75,0.3); background: rgba(232,184,75,0.08); }
.tag-spicy { color: #ff7b54; border-color: rgba(255,123,84,0.3); background: rgba(255,123,84,0.08); }
.tag-gf { color: #88c0d0; border-color: rgba(136,192,208,0.3); background: rgba(136,192,208,0.08); }
.tag-nuts { color: #d4a0ff; border-color: rgba(212,160,255,0.3); background: rgba(212,160,255,0.08); }

/* ── AR CTA BUTTON ────────────────────────────────────────── */
.ar-btn {
  width: 100%; height: 50px;
  border: none; border-radius: 14px;
  background: linear-gradient(135deg, #c9983a 0%, #e8b84b 50%, #c9983a 100%);
  background-size: 200% 100%; background-position: 100% 0;
  color: #0d0900;
  font-family: var(--font-body);
  font-size: 14px; font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform 0.15s ease, background-position 0.4s ease, box-shadow 0.3s ease;
  box-shadow: 0 6px 28px rgba(201,152,58,0.3);
  margin-top: auto;
  flex-shrink: 0;
}

.ar-btn:active {
  transform: scale(0.97);
  box-shadow: 0 3px 14px rgba(201,152,58,0.2);
}

.ar-btn::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  animation: btnShimmer 3.5s ease-in-out infinite 1s;
}
@keyframes btnShimmer {
  0% { left: -100%; }
  35%, 100% { left: 130%; }
}

.ar-btn-icon { font-size: 16px; }
.ar-btn-text { position: relative; z-index: 1; }

/* ── NO MODEL NOTICE ──────────────────────────────────────── */
.no-model-notice {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; pointer-events: none;
  display: none;
}
.no-model-notice.show { display: block; }
.no-model-big { font-size: 48px; margin-bottom: 12px; opacity: 0.15; }
.no-model-text {
  font-family: var(--font-body);
  font-size: 11px; font-weight: 300;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-muted);
}

/* ── ENTRY ANIMATIONS ─────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.home-header { animation: fadeUp 0.8s var(--ease-out-expo) both; }
.category-wrap { animation: fadeUp 0.8s var(--ease-out-expo) 0.1s both; }
.carousel-outer { animation: fadeIn 0.8s ease 0.2s both; }
.home-footer { animation: fadeUp 0.6s var(--ease-out-expo) 0.3s both; }

</style>
</head>
<body>

<div id="app">
  <div class="noise-layer"></div>

  <!-- ══ HOME SCREEN ══════════════════════════════════════ -->
  <div id="home-screen" class="screen">
    <div class="home-ambient"></div>

    <div class="home-header">
      <div class="home-overline">Est. 2024 · Fine Dining</div>
      <h1 class="home-title">The <em>Menu</em></h1>
      <p class="home-subtitle">Tap any dish to explore in 3D &amp; AR</p>
    </div>

    <div class="category-wrap" id="category-wrap"></div>

    <div class="carousel-outer">
      <div class="carousel-track" id="carousel-track"></div>
    </div>

    <div class="home-footer">
      <div class="carousel-dots" id="carousel-dots"></div>
      <div class="swipe-hint">Swipe to explore</div>
    </div>
  </div>

  <!-- ══ DISH DETAIL SCREEN ═══════════════════════════════ -->
  <div id="dish-screen" class="screen">
    <div class="dish-ambient" id="dish-ambient"></div>

    <div class="dish-back">
      <button class="back-btn" id="back-btn">
        <span class="back-arrow">←</span>
        <span class="back-label">Menu</span>
      </button>
      <div class="dish-counter" id="dish-counter"></div>
    </div>

    <div class="model-area" id="model-area">
      <div class="model-placeholder" id="model-placeholder">
        <div class="spinner-ring"></div>
        <div class="spinner-text">Loading model</div>
      </div>
      <div class="no-model-notice" id="no-model-notice">
        <div class="no-model-big">🍽</div>
        <div class="no-model-text">3D model coming soon</div>
      </div>
    </div>

    <div class="dish-ground-glow"></div>

    <div class="dish-panel">
      <div class="panel-handle"></div>
      <div class="panel-row-top">
        <div class="dish-detail-name" id="detail-name">—</div>
        <div class="dish-detail-price" id="detail-price">—</div>
      </div>
      <div class="dish-detail-desc" id="detail-desc">—</div>
      <div class="dish-tags" id="detail-tags"></div>
      <button class="ar-btn" id="ar-btn">
        <span class="ar-btn-icon">✦</span>
        <span class="ar-btn-text">View on your table</span>
      </button>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   MENU DATA — Edit everything below to customise
   ═══════════════════════════════════════════════════════════
   For each dish:
   - name        : Dish name (string)
   - price       : Display price (string, include currency symbol)
   - category    : Must match one of the categories array
   - description : 1–2 sentence description
   - tags        : Array of tags from: 'veg','dairy','spicy','gf','nuts'
   - modelUrl    : Path or URL to your .glb file (leave "" until ready)
   - iosUrl      : Path or URL to your .usdz file for iOS AR (leave "" until ready)
   - color       : Accent colour for card background (CSS linear-gradient string)
   - emoji       : Placeholder visual until model is ready
*/

const RESTAURANT_NAME = "AHARA";  /* ← Change this */
const RESTAURANT_TAGLINE = "Est. 2024 · Fine Dining"; /* ← Change this */

const CATEGORIES = ["All", "Starters", "Mains", "Desserts", "Drinks"];

const MENU = [
  {
    id: "dish-01",
    name: "VEG THALI",
    price: "₹480",
    category: "Mains",
    description: "Delicate broth of saffron, roasted tomato and spiced cream, finished with a thread of gold oil.",
    tags: ["veg",],
    modelUrl: "final_models/main_course/Thali-1.glb",   /* ← Add your .glb URL here */
    iosUrl: "",     /* ← Add your .usdz URL here */
    color: "linear-gradient(145deg,#1a1008,#2d1f0a,#1a120a)",
    emoji: "🥣"
  },

/* ═══════════════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════════════ */
const state = {
  activeCategory: "All",
  carouselIndex: 0,
  filteredDishes: [],
  activeDishId: null,
  isDragging: false,
  dragStartX: 0,
  dragCurrentX: 0,
  lastDragX: 0,
  dragVelocity: 0,
  currentModelViewer: null,
};

/* ═══════════════════════════════════════════════════════════
   DOM REFS
═══════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const homeScreen    = $('home-screen');
const dishScreen    = $('dish-screen');
const categoryWrap  = $('category-wrap');
const carouselTrack = $('carousel-track');
const carouselDots  = $('carousel-dots');
const backBtn       = $('back-btn');
const modelArea     = $('model-area');
const modelPH       = $('model-placeholder');
const noModelNotice = $('no-model-notice');
const detailName    = $('detail-name');
const detailPrice   = $('detail-price');
const detailDesc    = $('detail-desc');
const detailTags    = $('detail-tags');
const arBtn         = $('ar-btn');
const dishCounter   = $('dish-counter');

/* ═══════════════════════════════════════════════════════════
   TAG CONFIG
═══════════════════════════════════════════════════════════ */
const TAG_CONFIG = {
  veg:   { label: 'Vegetarian', cls: 'tag-veg' },
  dairy: { label: 'Contains Dairy', cls: 'tag-dairy' },
  spicy: { label: 'Spicy', cls: 'tag-spicy' },
  gf:    { label: 'Gluten-Free', cls: 'tag-gf' },
  nuts:  { label: 'Contains Nuts', cls: 'tag-nuts' },
};

/* ═══════════════════════════════════════════════════════════
   BUILD HOME
═══════════════════════════════════════════════════════════ */
function buildCategories() {
  categoryWrap.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat === state.activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => selectCategory(cat));
    categoryWrap.appendChild(btn);
  });
}

function selectCategory(cat) {
  state.activeCategory = cat;
  state.carouselIndex = 0;
  buildCategories();
  buildCarousel();
}

function buildCarousel() {
  state.filteredDishes = state.activeCategory === 'All'
    ? MENU
    : MENU.filter(d => d.category === state.activeCategory);

  carouselTrack.innerHTML = '';
  state.filteredDishes.forEach((dish, i) => {
    const card = document.createElement('div');
    card.className = 'dish-card ' + (i === state.carouselIndex ? 'active-card' : 'side');
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-img" style="background:${dish.color}"></div>
      <div class="food-illustration">${dish.emoji}</div>
      <div class="card-overlay"></div>
      <div class="card-tap-ring"><span class="card-tap-arrow">↗</span></div>
      <div class="card-content">
        <div class="card-category-badge">${dish.category}</div>
        <div class="card-name">${dish.name}</div>
        <div class="card-price">${dish.price}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      if (Math.abs(state.dragCurrentX - state.dragStartX) < 8) {
        openDish(dish);
      }
    });
    carouselTrack.appendChild(card);
  });

  buildDots();
  positionCarousel(false);
}

function buildDots() {
  carouselDots.innerHTML = '';
  const max = Math.min(state.filteredDishes.length, 8);
  for (let i = 0; i < max; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === state.carouselIndex ? ' active' : '');
    carouselDots.appendChild(dot);
  }
}

function positionCarousel(animate = true) {
  const cards = carouselTrack.querySelectorAll('.dish-card');
  const cardW = cards[0] ? cards[0].offsetWidth : (window.innerWidth - 80);
  const gap = 16;
  const offset = state.carouselIndex * (cardW + gap);

  if (!animate) carouselTrack.style.transition = 'none';
  else carouselTrack.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1)';

  carouselTrack.style.transform = `translateX(${-offset}px)`;

  cards.forEach((card, i) => {
    card.classList.toggle('active-card', i === state.carouselIndex);
    card.classList.toggle('side', i !== state.carouselIndex);
  });

  buildDots();
}

/* ═══════════════════════════════════════════════════════════
   CAROUSEL DRAG / SWIPE
═══════════════════════════════════════════════════════════ */
let velTracker = [];

carouselTrack.addEventListener('pointerdown', e => {
  state.isDragging = true;
  state.dragStartX = e.clientX;
  state.dragCurrentX = e.clientX;
  state.lastDragX = e.clientX;
  velTracker = [];
  carouselTrack.classList.add('dragging');
  carouselTrack.setPointerCapture(e.pointerId);
});

carouselTrack.addEventListener('pointermove', e => {
  if (!state.isDragging) return;
  const dx = e.clientX - state.dragStartX;
  state.dragCurrentX = e.clientX;

  velTracker.push({ x: e.clientX, t: Date.now() });
  if (velTracker.length > 5) velTracker.shift();

  const cards = carouselTrack.querySelectorAll('.dish-card');
  const cardW = cards[0] ? cards[0].offsetWidth : (window.innerWidth - 80);
  const gap = 16;
  const offset = state.carouselIndex * (cardW + gap);
  carouselTrack.style.transition = 'none';
  carouselTrack.style.transform = `translateX(${-offset + dx}px)`;
});

carouselTrack.addEventListener('pointerup', e => {
  if (!state.isDragging) return;
  state.isDragging = false;
  carouselTrack.classList.remove('dragging');

  const dx = e.clientX - state.dragStartX;
  const threshold = 60;
  const n = state.filteredDishes.length;

  if (dx < -threshold && state.carouselIndex < n - 1) state.carouselIndex++;
  else if (dx > threshold && state.carouselIndex > 0) state.carouselIndex--;

  positionCarousel(true);
});

carouselTrack.addEventListener('pointercancel', () => {
  state.isDragging = false;
  carouselTrack.classList.remove('dragging');
  positionCarousel(true);
});

/* ═══════════════════════════════════════════════════════════
   OPEN DISH DETAIL
═══════════════════════════════════════════════════════════ */
function openDish(dish) {
  state.activeDishId = dish.id;

  /* Fill panel */
  detailName.textContent  = dish.name;
  detailPrice.textContent = dish.price;
  detailDesc.textContent  = dish.description;

  detailTags.innerHTML = dish.tags.map(t => {
    const cfg = TAG_CONFIG[t];
    return cfg ? `<span class="dish-tag ${cfg.cls}">${cfg.label}</span>` : '';
  }).join('');

  /* Counter */
  const idx = state.filteredDishes.findIndex(d => d.id === dish.id);
  dishCounter.textContent = `${idx + 1} / ${state.filteredDishes.length}`;

  /* Clear old model viewer */
  const oldMV = modelArea.querySelector('model-viewer');
  if (oldMV) oldMV.remove();

  if (dish.modelUrl) {
    /* Has model — show spinner, then model-viewer */
    modelPH.classList.remove('hidden');
    noModelNotice.classList.remove('show');

    const mv = document.createElement('model-viewer');
    mv.setAttribute('src', dish.modelUrl);
    if (dish.iosUrl) mv.setAttribute('ios-src', dish.iosUrl);
    mv.setAttribute('ar', '');
    mv.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
    mv.setAttribute('camera-controls', '');
    mv.setAttribute('auto-rotate', '');
    mv.setAttribute('auto-rotate-delay', '1000');
    mv.setAttribute('rotation-per-second', '20deg');
    mv.setAttribute('shadow-intensity', '1.2');
    mv.setAttribute('shadow-softness', '1');
    mv.setAttribute('environment-image', 'neutral');
    mv.setAttribute('exposure', '0.85');
    mv.setAttribute('camera-orbit', '0deg 70deg 105%');
    mv.setAttribute('min-camera-orbit', 'auto 30deg auto');
    mv.setAttribute('max-camera-orbit', 'auto 90deg auto');
    mv.setAttribute('disable-zoom', '');
    mv.style.cssText = 'width:100%;height:100%;background:transparent;';
    mv.addEventListener('load', () => { modelPH.classList.add('hidden'); });
    modelArea.appendChild(mv);
    state.currentModelViewer = mv;

  } else {
    /* No model — show placeholder state */
    modelPH.classList.add('hidden');
    noModelNotice.classList.add('show');
    state.currentModelViewer = null;
  }

  /* Show dish screen */
  dishScreen.classList.add('active');
  document.body.style.overflow = 'hidden';
}

/* ═══════════════════════════════════════════════════════════
   CLOSE DISH — return to exact carousel position
═══════════════════════════════════════════════════════════ */
backBtn.addEventListener('click', () => {
  dishScreen.classList.remove('active');
  noModelNotice.classList.remove('show');
  modelPH.classList.remove('hidden');
  const oldMV = modelArea.querySelector('model-viewer');
  if (oldMV) oldMV.remove();
  state.currentModelViewer = null;
});

/* ═══════════════════════════════════════════════════════════
   AR BUTTON
═══════════════════════════════════════════════════════════ */
arBtn.addEventListener('click', () => {
  const dish = MENU.find(d => d.id === state.activeDishId);
  if (!dish) return;

  /* Scale feedback */
  arBtn.style.transform = 'scale(0.97)';
  setTimeout(() => { arBtn.style.transform = ''; }, 150);

  if (!dish.modelUrl) {
    arBtn.querySelector('.ar-btn-text').textContent = 'Model coming soon';
    setTimeout(() => {
      arBtn.querySelector('.ar-btn-text').textContent = 'View on your table';
    }, 2000);
    return;
  }

  const ua = navigator.userAgent;

  if (state.currentModelViewer) {
    /* Use model-viewer's built-in AR activation */
    state.currentModelViewer.activateAR();
  } else if (/iPhone|iPad/i.test(ua) && dish.iosUrl) {
    const a = document.createElement('a');
    a.rel = 'ar'; a.href = dish.iosUrl;
    const img = document.createElement('img');
    img.src = 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';
    a.appendChild(img); document.body.appendChild(a);
    a.click(); document.body.removeChild(a);
  } else {
    const intent = `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(dish.modelUrl)}&mode=ar_preferred#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=${encodeURIComponent(dish.modelUrl)};end;`;
    window.location.href = intent;
  }
});

/* ═══════════════════════════════════════════════════════════
   HASH ROUTING — deep link to a dish via #dish/dish-id
═══════════════════════════════════════════════════════════ */
function handleHash() {
  const hash = window.location.hash;
  if (hash.startsWith('#dish/')) {
    const id = hash.replace('#dish/', '');
    const dish = MENU.find(d => d.id === id);
    if (dish) {
      state.activeCategory = dish.category;
      state.filteredDishes = MENU.filter(d => d.category === dish.category);
      state.carouselIndex = state.filteredDishes.findIndex(d => d.id === id);
      buildCategories();
      buildCarousel();
      setTimeout(() => openDish(dish), 100);
    }
  }
}

window.addEventListener('hashchange', handleHash);

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
buildCategories();
buildCarousel();
handleHash();

/* Update restaurant name in document */
document.title = RESTAURANT_NAME + ' — Menu';

</script>
